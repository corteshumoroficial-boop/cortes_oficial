version: '3.8'

services:
  hook-hustle-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hook-hustle-engine
    ports:
      - "4173:4173"
    environment:
      NODE_ENV: production
      # REMOVE_BG_API_KEY: seu_api_key_aqui (opcional)
    volumes:
      - ./tmp/thumbnails:/app/tmp/thumbnails
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
